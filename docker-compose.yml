version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qgrid-postgres
    environment:
      POSTGRES_DB: qgrid_shield
      POSTGRES_USER: qgrid_admin
      POSTGRES_PASSWORD: qgrid_secure_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qgrid_admin -d qgrid_shield"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qgrid-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
